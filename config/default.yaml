# Feature flags and run defaults. A disabled source returns a traceable
# skipped_disabled ToolResult; it never silently disappears (§37.7).

focal_company:
  name: Rippling
  domain: rippling.com

sources:
  website: true
  wayback: true
  exa_web: true
  exa_linkedin: true
  similarweb: true
  google_ads: true
  meta_ads: false
  linkedin_ads: false
  reviews: true
  jobs: true
  events: true
  ooh: true
  monitors: true

execution:
  live_tools: false
  allow_browser: false
  allow_model_repair_retry: true
  render_html: true
  persist_raw_content: true
  refresh_rippling: false

budgets:
  research_budget_usd: 10.00
  max_runtime_seconds: 2700
  max_iterations: 60
  max_tool_calls: 200
  max_retries_per_source: 2

portfolio:
  max_concurrent_company_runs: 2
  max_competitors_per_demo: 3
  max_exa_agent_runs: 2

windows:
  lookback_days: 365
  current_days: 90

# Site-coverage depth. Whole-site characterization needs more than a handful of
# pages (user directive): raise the cap and lower the score threshold so
# product / solution / use-case pages are collected, and use Exa domain-scoped
# discovery to catch pages the sitemap misses. Tune down for a fast demo.
collection:
  # ~30 high-authority first-party pages (homepage/platform/pricing/products/
  # solutions/customers are always captured now that the map scores→sorts→
  # truncates), + wayback + news + comparison + discovery + optional sources
  # ≈ 45-55 artifacts, while leaving budget for the mirror (comparison) and
  # temporal analysis. Tune up for maximum depth, down for a fast demo.
  max_fetched_pages: 30
  fetch_score_threshold: 0.3
  deep_crawl: true
  exa_site_discovery_results: 10
  # Historical (Wayback) depth for longitudinal/comparative runs. More snapshots
  # spread across the prior window give finer temporal resolution (priority #2:
  # time-based accuracy); extra_pages archives more positioning surfaces so
  # change detection has both periods on comparable pages. Tunable per run.
  historical:
    homepage_snapshots: 6
    positioning_snapshots: 3
    extra_pages: ["/products", "/solutions", "/hr-platform"]

# Exa Agent (agentic web research) — used for the LinkedIn / social-presence
# dimension the plain search never reaches. effort trades cost vs depth
# (minimal|low|medium|high|xhigh|auto). data_sources attaches premium Exa
# partners (e.g. "similarweb") — leave empty if not on your Exa plan; the agent
# still researches public web + LinkedIn without them.
exa_agent:
  effort: low
  data_sources: []

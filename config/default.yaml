# Feature flags and run defaults. A disabled source returns a traceable
# skipped_disabled ToolResult; it never silently disappears (§37.7).

focal_company:
  name: Rippling
  domain: rippling.com

sources:
  website: true
  wayback: true
  exa_web: true
  exa_linkedin: true
  similarweb: true
  google_ads: true
  # Preferred live Google-ads seam: SerpApi Google Ads Transparency Center API
  # (real cited creatives). Needs SERPAPI_API_KEY + an advertiser domain; on
  # typed-empty/unavailable it falls back to the Exa web path. Fail-closed: when
  # this flag is absent the SerpApi seam is skipped entirely.
  google_ads_serpapi: true
  # Meta/LinkedIn ad libraries are proposed so the attempt + honest limitation
  # show in the trace; live they degrade to a typed unsupported/skip (§39.7).
  meta_ads: true
  linkedin_ads: true
  reviews: true
  # Keyword metric enrichment (Semrush provider seam); keyless -> typed unsupported.
  keywords: true
  jobs: true
  events: true
  ooh: true
  # Adversarial-context news sweep (what is happening TO the competitor:
  # litigation/funding/M&A/launches). Keyless -> typed unsupported (Exa key).
  news_market: true
  monitors: true

execution:
  live_tools: false
  allow_browser: false
  allow_model_repair_retry: true
  render_html: true
  persist_raw_content: true
  refresh_rippling: false
  # Reasoning model IN the planning loop (§37.16): after the rules PROPOSE and
  # score candidate actions, the plan_research model DECIDES the next candidate
  # (in its own words) or decides to stop, reacting to what recent tool calls
  # returned. It may only choose from the supplied candidates. Set false to fall
  # back to the deterministic top scorer on every turn (rules-only behavior).
  llm_in_the_loop: true

budgets:
  research_budget_usd: 12.00
  max_runtime_seconds: 3600
  max_iterations: 90
  max_tool_calls: 200
  max_retries_per_source: 2

portfolio:
  max_concurrent_company_runs: 2
  max_competitors_per_demo: 3
  # Raised 2 -> 6: per-competitor Similarweb peer enrichment adds up to 3
  # bounded Exa Agent runs on top of the company's own similarweb + LinkedIn
  # research runs (kept in sync with exa_agent.max_exa_agent_runs below).
  max_exa_agent_runs: 6

windows:
  lookback_days: 365
  current_days: 90

# Site-coverage depth. Whole-site characterization needs more than a handful of
# pages (user directive): raise the cap and lower the score threshold so
# product / solution / use-case pages are collected, and use Exa domain-scoped
# discovery to catch pages the sitemap misses. Tune down for a fast demo.
collection:
  # ~30 high-authority first-party pages (homepage/platform/pricing/products/
  # solutions/customers are always captured now that the map scores→sorts→
  # truncates), + wayback + news + comparison + discovery + optional sources
  # ≈ 45-55 artifacts, while leaving budget for the mirror (comparison) and
  # temporal analysis. Tune up for maximum depth, down for a fast demo.
  # Raised for product-offering breadth (user directive): with category
  # round-robin + product-slug scoring, ~48 pages spans every product vertical
  # (payroll/EOR/HRIS/benefits/IT/spend/...) so per-vertical analysis has real
  # coverage instead of one category masking another.
  max_fetched_pages: 60
  fetch_score_threshold: 0.3
  deep_crawl: true
  exa_site_discovery_results: 12
  # Historical (Wayback) depth for longitudinal/comparative runs. More snapshots
  # spread across the prior window give finer temporal resolution (priority #2:
  # time-based accuracy); extra_pages archives more positioning surfaces so
  # change detection has both periods on comparable pages. Tunable per run.
  historical:
    homepage_snapshots: 6
    positioning_snapshots: 3
    extra_pages: ["/products", "/solutions", "/hr-platform"]

# Exa Agent (agentic web research) — used for the LinkedIn / social-presence
# dimension the plain search never reaches. effort trades cost vs depth
# (minimal|low|medium|high|xhigh|auto). data_sources attaches premium Exa
# partners (e.g. "similarweb") — leave empty if not on your Exa plan; the agent
# still researches public web + LinkedIn without them.
exa_agent:
  effort: auto
  data_sources: []
  linkedin_num_posts: 30
  # Cap on Exa Agent runs per company pipeline (2 -> 6: company similarweb +
  # LinkedIn research + up to 3 top-affinity peer-domain enrichments).
  max_exa_agent_runs: 6

# Feature flags and run defaults. A disabled source returns a traceable
# skipped_disabled ToolResult; it never silently disappears (§37.7).

focal_company:
  name: Rippling
  domain: rippling.com

sources:
  website: true
  wayback: true
  exa_web: true
  exa_linkedin: true
  similarweb: true
  google_ads: true
  meta_ads: false
  linkedin_ads: false
  reviews: true
  jobs: true
  events: true
  ooh: true
  monitors: true

execution:
  live_tools: false
  allow_browser: false
  allow_model_repair_retry: true
  render_html: true
  persist_raw_content: true
  refresh_rippling: false

budgets:
  research_budget_usd: 8.00
  max_runtime_seconds: 1800
  max_iterations: 60
  max_tool_calls: 160
  max_retries_per_source: 2

portfolio:
  max_concurrent_company_runs: 2
  max_competitors_per_demo: 3
  max_exa_agent_runs: 2

windows:
  lookback_days: 365
  current_days: 90

# Site-coverage depth. Whole-site characterization needs more than a handful of
# pages (user directive): raise the cap and lower the score threshold so
# product / solution / use-case pages are collected, and use Exa domain-scoped
# discovery to catch pages the sitemap misses. Tune down for a fast demo.
collection:
  # Target ~50 artifacts total per company (user directive): ~42 first-party
  # pages + wayback + news + comparison + discovery. Tune down for a fast demo.
  max_fetched_pages: 42
  fetch_score_threshold: 0.28
  deep_crawl: true
  exa_site_discovery_results: 12

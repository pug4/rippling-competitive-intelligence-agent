# Classification taxonomy. Fully swappable: the pipeline reads every list from
# this file so the tool can retarget to a different focal company or industry
# without code changes. Classifiers may return values outside these lists as
# `unclassified_signals` — the taxonomy guides, it does not force (§10.3).

taxonomy_version: "1.0.0"

themes:
  - consolidation
  - compliance
  - cost_reduction
  - global_hiring
  - automation
  - employee_experience
  - data_accuracy
  - speed_to_value
  - security_and_control
  - scalability
  - workforce_visibility
  # integration_breadth was too coarse (feedback #2): split into distinct
  # strategic postures so "an API exists" is not conflated with "one unified
  # data layer".
  - api_extensibility          # developer/API surface for building on the product
  - integration_ecosystem      # marketplace / breadth of third-party connectors
  - cross_system_workflow       # automations that span multiple systems
  - native_platform_breadth     # many first-party modules under one platform
  - data_unification            # one shared employee/business data model

